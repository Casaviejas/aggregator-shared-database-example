openapi: 3.0.0
info:
  title: Aggregator API
  description: API que agrega información de usuario y órdenes desde servicios internos.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Servidor local de desarrollo

paths:
  /profile:
    get:
      summary: Obtener perfil del usuario autenticado
      description: Devuelve los datos del usuario y sus órdenes asociadas.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil obtenido correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  orders:
                    $ref: '#/components/schemas/OrdersResponse'
                  warnings:
                    type: array
                    items:
                      type: string
                example:
                  user:
                    _id: "69baa97a214fc8902ce7dbf9"
                    name: "DanielAggregator"
                    email: "danielaggregator@gmail.com"
                    createdAt: "2026-03-18T13:32:42.553Z"
                    updatedAt: "2026-03-18T13:32:42.553Z"
                    __v: 0
                  orders:
                    orders:
                      - _id: "69bb2f7b6dcf108e9d78f916"
                        userID: "69baa97a214fc8902ce7dbf9"
                        order_name: "Producto 3"
                        quantity: 1
                        createdAt: "2026-03-18T23:04:27.969Z"
                        updatedAt: "2026-03-18T23:04:27.969Z"
                        __v: 0
                  warnings: []
        '401':
          description: Token requerido o inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token requerido
        '500':
          description: Error interno al obtener perfil
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error obteniendo perfil

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        __v:
          type: integer

    Order:
      type: object
      properties:
        _id:
          type: string
        userID:
          type: string
        order_name:
          type: string
        quantity:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        __v:
          type: integer

    OrdersResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/Order'